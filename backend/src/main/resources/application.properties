spring.application.name=ems-backend

# ─── Database ────────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ems_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:shyam@2119}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Server ──────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── JWT ─────────────────────────────────────────────────────────────────────
app.jwt.secret=${APP_JWT_SECRET:EmsSecretKey2024SuperLongKeyForJWTTokenGen!@#$}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# ─── OpenAPI / Swagger ───────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── Jackson ─────────────────────────────────────────────────────────────────
spring.jackson.serialization.fail-on-empty-beans=false

# ─── Scheduling ──────────────────────────────────────────────────────────────
spring.task.scheduling.pool.size=2

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

logging.level.com.ems=DEBUG
logging.level.org.springframework.security=WARN
